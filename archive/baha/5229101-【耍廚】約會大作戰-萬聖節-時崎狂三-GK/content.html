<div id="article_content" class="text-paragraph article_container">又到了開箱的時間，我為甚麼說又呢<div><br></div><div>這次要開箱PO出來主要是因為這個好像是限量288隻，感覺不太有人會開箱，</div><div>所以就來個不專業開箱，其實主要是檢查有沒有缺件之類的。</div><div><br></div><div><br></div><div>這隻是由Endless Boundary出產的，送來好大一箱，看數據是說1/6。</div><div><img src="images/01.jpg" class="gallery-image" border="0" /></div><div><img src="images/02.jpg" class="gallery-image" border="0" /></div><div><br></div><div>箱子有傷阿，還好裡面還有箱子</div><div><img src="images/03.jpg" class="gallery-image" border="0" /></div><div><br></div><div>實物差不多就長這樣，本來以為下面的南瓜是有燈的。</div><div>打開以後整塊黑黑的。</div><div><img src="images/04.jpg" class="gallery-image" border="0" /></div><div><br></div><div>打開之後可以看到有很多分件</div><div><img src="images/05.jpg" class="gallery-image" border="0" /></div><div><br></div><div>接下來就組裝起來吧</div><div><img src="images/06.jpg" class="gallery-image" border="0" /></div><div><img src="images/07.jpg" class="gallery-image" border="0" /></div><div><img src="images/08.jpg" class="gallery-image" border="0" /></div><div><img src="images/09.jpg" class="gallery-image" border="0" /></div><div><img src="images/10.jpg" class="gallery-image" border="0" /></div><div><img src="images/11.jpg" class="gallery-image" border="0" /></div><div><br></div><div>最後把帽子拿下來看看。</div><div><img src="images/12.jpg" class="gallery-image" border="0" /></div><div><br></div><div>大概94醬，沒有特別打光跟set環境請見諒，主要還是檢查跟紀錄一下，</div><div>有機會真的想把所有狂三都拿來拍(舔)一遍。</div><div><br></div><div>以上!</div><script>
