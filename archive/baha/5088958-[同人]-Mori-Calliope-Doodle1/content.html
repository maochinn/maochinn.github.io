<div id="article_content" class="text-paragraph article_container"><div>雖然我比較常追Gura，但是死神這個外型很對我的胃口，所以就畫了，</div><div>主要是想要練練半身圖，因為以前畫全身圖反而常常綁手綁腳(物理)不好設計畫面，那就乾脆只畫半身，</div><div>然後因為每天時間也不多，所以就只做黑白的設計。</div><div><br></div><div>一開始只是興趣使然的塗鴉，但是後面常常手癢時間越拉越長，但我怎麼就管不住這手呢(ﾟ皿ﾟﾒ)。</div><div>之後應該還是想辦法維持一天一張，而且不管完成度都要壓時間，就看我能堅持多久了。</div><div><br></div><div>如果想要追(監)蹤(督)我每天有沒有FAFA，可以到我的<a href="https://www.facebook.com/maochinnn" target="_blank">粉專</a>，小屋這邊應該就是蒐集一定的量就會發在這邊，</div><div>預計之後應該會把比較順眼的幾張再加工過，我是想把他們都裁成正方形，這樣應該會比較有整體感。</div><div><br></div><div><br></div><script>
