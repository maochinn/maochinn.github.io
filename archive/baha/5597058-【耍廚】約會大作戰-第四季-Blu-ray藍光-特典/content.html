<div id="article_content" class="text-paragraph article_container"><font color="#4b4a4a"><font size="3"><font style="background-color:#FAF9F7;">由於</font></font></font><font color="#4B4A4A"><font style="background-color:#FAF9F7;">上星期剛好到貨，加上</font></font><font color="#4b4a4a"><font size="3"><font style="background-color:#FAF9F7;">沒有看到有人開箱我就來開箱啦</font></font></font><div><font color="#4b4a4a">圖多注意!</font></div><div><font color="#4b4a4a"><br></font><div><font color="#4b4a4a">因為我是預購角川的上下卷，所以有多一塊特典畫布</font><img src="images/01.jpg" class="gallery-image" border="0" /><div><img src="images/02.jpg" class="gallery-image" border="0" /></div></div></div><div><strike>就是為了這塊板子上的狂三才預購的</strike></div><div><img src="images/03.jpg" class="gallery-image" border="0" /></div><div><br></div><div>首先是大盒的第一卷</div><div><img src="images/04.jpg" class="gallery-image" border="0" /></div><div>一打開可以看到掛軸</div><div><img src="images/05.jpg" class="gallery-image" border="0" /></div><div>然後就是小盒的BD</div><div><img src="images/06.jpg" class="gallery-image" border="0" /></div><div>裏頭有特典小說、每集的簡介跟BD</div><div><img src="images/07.jpg" class="gallery-image" border="0" /></div><div><img src="images/08.jpg" class="gallery-image" border="0" /></div><div>(裡面好像有約戰手遊的序號，不確定是不是日服才能用，如果有需要可以私我)</div><div><br></div><div>然後是第二卷</div><div><img src="images/09.jpg" class="gallery-image" border="0" /></div><div>打開一樣有三個東西，分別是設定資料集、每集的簡介跟BD</div><div><img src="images/10.jpg" class="gallery-image" border="0" /></div><div><img src="images/11.jpg" class="gallery-image" border="0" /></div><div>背面是一個三三&lt;3</div><div><img src="images/12.jpg" class="gallery-image" border="0" /></div><div><br></div><div>其他詳細內容就不公開啦，這次不想花太多錢所以只有買一家的店鋪特典，</div><div>如果反饋好的話我在慢慢把之前買的周邊開箱好了。</div><div><strike>是說我好像都靠耍廚來水文章</strike></div><div><br></div><div>以上!</div><script>
