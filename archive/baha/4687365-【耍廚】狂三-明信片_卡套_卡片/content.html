<div id="article_content" class="text-paragraph article_container">終於把東西都整理得差不多了，<div><br></div><div>首先是A6以下的明信片收藏，</div><div>這邊我花了一些時間才找到收藏冊，</div><div>因為大部分資料夾都是A4左右的，</div><div><br></div><div>這邊我用的是 <a href="https://www.youtube.com/watch?v=VJjS7Zkwt9k" target="_blank">KOKUYO NOViTA α資料夾</a></div><div>它有分幾個尺寸，這邊就是用明信片夾。</div><div><img src="images/01.jpg" class="gallery-image" border="0" /></div><div><img src="images/02.jpg" class="gallery-image" border="0" /></div><div><img src="images/03.jpg" class="gallery-image" border="0" /></div><div><img src="images/04.jpg" class="gallery-image" border="0" /></div><div><img src="images/05.jpg" class="gallery-image" border="0" /></div><div><img src="images/06.jpg" class="gallery-image" border="0" /></div><div>這邊主要展示的是同人、寫真明信片、官方一些特典的短篇。</div><div><br></div><div>接下來是卡套/卡片</div><div><br></div><div>這邊是用標準的卡片收藏冊，</div><div>隨便去卡店應該都買的到</div><div><img src="images/07.jpg" class="gallery-image" border="0" /></div><div><img src="images/08.jpg" class="gallery-image" border="0" /></div><div><img src="images/09.jpg" class="gallery-image" border="0" /><img src="images/10.jpg" class="gallery-image" border="0" /></div><div><img src="images/11.jpg" class="gallery-image" border="0" /></div><div><img src="images/12.jpg" class="gallery-image" border="0" /></div><div><img src="images/13.jpg" class="gallery-image" border="0" /></div><div><img src="images/14.jpg" class="gallery-image" border="0" /></div><div><img src="images/15.jpg" class="gallery-image" border="0" /></div><div>大GUY就是這些，</div><div><br></div><div>接下來還有比較大一些周邊、資料夾、吊飾、胸章等等</div><div>應該會再分兩篇來發吧，</div><div>畢竟花了不少精力去收藏，就多發幾篇ㄅ</div><div><br></div><div>以上!</div><script>
