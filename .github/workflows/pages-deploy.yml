name: "Build and Deploy"
on:
  push:
    branches:
      - main
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE
  workflow_dispatch:
  workflow_run:
    # 兩個內容同步 workflow 用 GITHUB_TOKEN push，不會觸發上面的 push event，靠這裡接力部署
    workflows: [ZMediumToMarkdown, Content Sync]
    types:
      - completed

concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        run: npm ci
        working-directory: site

      - name: Import content (posts + assets from this repo)
        run: node scripts/import-content.mjs
        working-directory: site
        env:
          JEKYLL_DIR: ".."

      - name: Import Bahamut creations (from archive/baha)
        run: node scripts/import-baha.mjs
        working-directory: site

      - name: Build Astro site
        run: npm run build
        working-directory: site
        env:
          EXCLUDE_R18: "1"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true

      - name: Build Chirpy mirror at /medium/
        run: bundle exec jekyll b -d site/dist/medium --config _config.yml,_config.astro.yml
        env:
          JEKYLL_ENV: "production"

      # RSS 訂閱者與搜尋引擎抓的是 root 的 feed/sitemap/robots；
      # Jekyll 版都搬去 /medium/ 了，把它們複製一份回 root（內容連結指向 /medium/，仍有效）
      - name: Keep root feed/sitemap/robots alive
        run: cp site/dist/medium/feed.xml site/dist/medium/sitemap.xml site/dist/medium/robots.txt site/dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
